name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Pruebas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  docker:
    name: Build de imagen Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Construir la imagen
        run: docker build -t centinela:ci .
